# uv workspace root (virtual — not a package itself).
# Members are the individual packages under packages/. Shared dev tooling and
# config (pytest, ruff) live here so both v1 and v2 share one setup.

[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["packages/scalar/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "-q"
